# TLS/HTTPS (ключи и пароль — через переменные окружения, не в репозитории!)
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEY_STORE_PATH:file:./certs/carsharing-keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=carsharing-server

# Подключаем локальные настройки (пароль БД) — application-local.properties в .gitignore
spring.profiles.include=local

# PostgreSQL - use postgres user (env vars can override)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carsharing}
spring.datasource.username=postgres
# Пароль из переменной окружения DB_PASSWORD (не хранить в репозитории!)
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security debug (временно)
logging.level.org.springframework.security=DEBUG

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-chars}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true