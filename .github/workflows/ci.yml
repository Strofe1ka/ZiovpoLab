name: CI

on:
  push:
    branches: [main, lab-1]
  pull_request:
    branches: [main, lab-1]
  workflow_dispatch:

jobs:
  build-test-package:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -e compile

      - name: Test
        run: mvn -B -e test

      - name: Package
        run: mvn -B -e -DskipTests package

      - name: Upload artifact to GitHub Actions storage
        uses: actions/upload-artifact@v4
        with:
          name: backend-spring-boot-jar
          path: target/*.jar
          retention-days: 30

  # Ручной запуск: Actions → CI → Run workflow. Нужны секреты SSL_KEYSTORE_BASE64 и SSL_KEYSTORE_PASSWORD.
  package-with-keystore-from-secrets:
    name: Restore PKCS12 from secrets, build, upload JAR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Restore PKCS12 from GitHub Secrets
        env:
          SSL_KEYSTORE_BASE64: ${{ secrets.SSL_KEYSTORE_BASE64 }}
          SSL_KEYSTORE_PASSWORD: ${{ secrets.SSL_KEYSTORE_PASSWORD }}
        run: |
          set -e
          if [ -z "${SSL_KEYSTORE_BASE64}" ] || [ -z "${SSL_KEYSTORE_PASSWORD}" ]; then
            echo "::error::Create repository secrets SSL_KEYSTORE_BASE64 and SSL_KEYSTORE_PASSWORD (see docs/tasks/task-2-tls-ci.md)."
            exit 1
          fi
          mkdir -p certs/ci
          echo "$SSL_KEYSTORE_BASE64" | base64 -d > certs/ci/ziovpo-bsuir-app-endpoint.p12
          test -s certs/ci/ziovpo-bsuir-app-endpoint.p12
          echo "PKCS12 restored to certs/ci/ (not uploaded as artifact)."

      - name: Compile
        run: mvn -B -e compile

      - name: Test
        run: mvn -B -e test

      - name: Package
        run: mvn -B -e -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-spring-boot-jar-secrets-job
          path: target/*.jar
          retention-days: 30
