name: CI

on:
  push:
    branches: [main, lab-1]
  pull_request:
    branches: [main, lab-1]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test
        run: mvn -B -e test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build
        run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar
