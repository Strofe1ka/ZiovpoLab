stages:
  - test
  - build

variables:
  MAVEN_CLI_OPTS: "-B -e -DskipTests=false"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS test

build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn -B -DskipTests package
  artifacts:
    paths:
      - target/*.jar
